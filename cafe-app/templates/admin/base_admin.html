{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-md-3 col-lg-2 mb-4">
      <div class="card p-3">
        <h6 class="text-muted mb-3">ADMIN PANEL</h6>
        <div class="list-group list-group-flush">
          <a href="{{ url_for('admin_dashboard.index') }}" class="list-group-item list-group-item-action {% if request.endpoint == 'admin_dashboard.index' %}active{% endif %}">📊 Dashboard</a>
          <a href="{{ url_for('admin_product.index') }}" class="list-group-item list-group-item-action {% if request.endpoint and request.endpoint.startswith('admin_product') %}active{% endif %}">🍰 Produk</a>
          <a href="{{ url_for('admin_category.index') }}" class="list-group-item list-group-item-action {% if request.endpoint and request.endpoint.startswith('admin_category') %}active{% endif %}">🏷️ Kategori</a>
          <a href="{{ url_for('admin_order.index') }}" class="list-group-item list-group-item-action {% if request.endpoint and request.endpoint.startswith('admin_order') %}active{% endif %}">🧾 Pesanan</a>
          <a href="{{ url_for('admin_user.index') }}" class="list-group-item list-group-item-action {% if request.endpoint and request.endpoint.startswith('admin_user') %}active{% endif %}">👤 User</a>
          <a href="{{ url_for('admin_log.index') }}" class="list-group-item list-group-item-action {% if request.endpoint and request.endpoint.startswith('admin_log') %}active{% endif %}">📜 Activity Log</a>
        </div>
      </div>
    </div>
    <div class="col-md-9 col-lg-10">
      {% block admin_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
